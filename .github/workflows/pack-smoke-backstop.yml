name: Pack Smoke Backstop

on:
  schedule:
    - cron: '45 9 * * 1'
  workflow_dispatch:

jobs:
  pack-smoke-backstop:
    name: Pack Smoke Backstop
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Downstream simulation smoke
        run: npm run pack:smoke
