name: Docs Truthfulness Weekly

on:
  schedule:
    - cron: '30 9 * * 1'
  workflow_dispatch:

concurrency:
  group: docs-truthfulness-weekly
  cancel-in-progress: false

jobs:
  docs-truthfulness-weekly:
    name: Docs Truthfulness Weekly
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    env:
      MCP_RUNNER_TASK_ID: docs-truthfulness-weekly
      REPORT_DIR: out/docs-truthfulness-weekly
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate weekly docs drift report
        run: |
          npm run docs:freshness -- \
            --warn \
            --report "$REPORT_DIR/docs-freshness.json" \
            --summary-markdown "$REPORT_DIR/docs-freshness-summary.md"

      - name: Publish workflow summary
        run: cat "$REPORT_DIR/docs-freshness-summary.md" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload docs drift artifacts
        uses: actions/upload-artifact@v4
        with:
          name: docs-truthfulness-weekly
          path: |
            ${{ env.REPORT_DIR }}/docs-freshness.json
            ${{ env.REPORT_DIR }}/docs-freshness-summary.md
