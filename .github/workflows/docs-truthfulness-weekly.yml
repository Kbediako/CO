name: Repo Stewardship Weekly

on:
  schedule:
    - cron: '30 9 * * 1'
  workflow_dispatch:

concurrency:
  group: repo-stewardship-weekly
  cancel-in-progress: false

jobs:
  repo-stewardship-weekly:
    name: Repo Stewardship Weekly
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    env:
      MCP_RUNNER_TASK_ID: docs-truthfulness-weekly
      REPORT_DIR: out/docs-truthfulness-weekly
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate front-door docs truth
        run: npm run docs:check

      - name: Generate weekly docs drift and repo stewardship reports
        run: |
          npm run docs:freshness -- \
            --warn \
            --report "$REPORT_DIR/docs-freshness.json" \
            --summary-markdown "$REPORT_DIR/docs-freshness-summary.md"
          npm run repo:stewardship -- \
            --warn \
            --report "$REPORT_DIR/repo-stewardship.json" \
            --summary-markdown "$REPORT_DIR/repo-stewardship-summary.md"

      - name: Publish workflow summary
        run: |
          cat "$REPORT_DIR/docs-freshness-summary.md" >> "$GITHUB_STEP_SUMMARY"
          printf '\n' >> "$GITHUB_STEP_SUMMARY"
          cat "$REPORT_DIR/repo-stewardship-summary.md" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload repo stewardship artifacts
        uses: actions/upload-artifact@v4
        with:
          name: repo-stewardship-weekly
          path: |
            ${{ env.REPORT_DIR }}/docs-freshness.json
            ${{ env.REPORT_DIR }}/docs-freshness-summary.md
            ${{ env.REPORT_DIR }}/repo-stewardship.json
            ${{ env.REPORT_DIR }}/repo-stewardship-summary.md
