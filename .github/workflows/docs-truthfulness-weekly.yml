name: Docs Truthfulness Maintenance

on:
  schedule:
    - cron: '15 0 * * *'
  workflow_dispatch:

concurrency:
  group: docs-truthfulness-maintenance
  cancel-in-progress: false

jobs:
  docs-truthfulness-maintenance:
    name: Docs Truthfulness Maintenance
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      actions: write
      contents: read
    env:
      MCP_RUNNER_TASK_ID: docs-truthfulness-maintenance
      REPORT_DIR: out/docs-truthfulness-maintenance
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate front-door docs truth
        run: npm run docs:check

      - name: Generate docs freshness maintenance and repo stewardship reports
        run: |
          npm run docs:freshness:maintain -- \
            --warn \
            --format json \
            --freshness-report "$REPORT_DIR/docs-freshness.json" \
            --report "$REPORT_DIR/docs-freshness-maintenance.json" \
            --summary-markdown "$REPORT_DIR/docs-freshness-summary.md"
          npm run docs:archive-implementation -- \
            --dry-run \
            --out "$REPORT_DIR/implementation-docs-archive"
          npm run repo:stewardship -- \
            --warn \
            --report "$REPORT_DIR/repo-stewardship.json" \
            --summary-markdown "$REPORT_DIR/repo-stewardship-summary.md"

      - name: Trigger mechanical archive self-heal when needed
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          NEEDS_ARCHIVE="$(node <<'NODE'
          const fs = require('fs');
          const reportPath = `${process.env.REPORT_DIR}/implementation-docs-archive/docs-archive-report.json`;
          const report = JSON.parse(fs.readFileSync(reportPath, 'utf8'));
          const archived = report.totals?.archived ?? 0;
          const registryRepairs = report.totals?.registry_repairs ?? 0;
          const actionRequired =
            report.action_path?.archive_payload_required === true ||
            (report.action_path?.archive_payload_required !== false &&
              report.action_path?.action_required === true &&
              archived > 0);
          fs.appendFileSync(
            process.env.GITHUB_STEP_SUMMARY,
            [
              '',
              '## Implementation Docs Archive Forecast',
              '',
              `- Mechanical archive candidates: ${archived}`,
              `- Registry-only repairs: ${registryRepairs}`,
              `- Stray candidates: ${report.totals?.stray_candidates ?? 0}`,
              `- Self-heal workflow: ${actionRequired ? 'requested' : 'not required'}`
            ].join('\n') + '\n'
          );
          process.stdout.write(actionRequired ? 'true' : 'false');
          NODE
          )"
          if [ "$NEEDS_ARCHIVE" = "true" ]; then
            gh workflow run implementation-docs-archive-automation.yml --ref main
          fi

      - name: Publish workflow summary
        if: always()
        run: |
          cat "$REPORT_DIR/docs-freshness-summary.md" >> "$GITHUB_STEP_SUMMARY"
          node <<'NODE'
          const fs = require('fs');

          const report = JSON.parse(
            fs.readFileSync(`${process.env.REPORT_DIR}/docs-freshness-maintenance.json`, 'utf8')
          );
          const evidence = report.owner_action_evidence && typeof report.owner_action_evidence === 'object'
            ? report.owner_action_evidence
            : {};
          const gate = report.repo_gate && typeof report.repo_gate === 'object' ? report.repo_gate : {};
          const actions = Array.isArray(evidence.actions) ? evidence.actions : [];
          const action = actions.find((item) => item && typeof item === 'object') || {};
          const copyableCommands = actions
            .map((item) => typeof item?.copyable_command === 'string' ? item.copyable_command.trim() : '')
            .filter(Boolean);
          const bodyDescriptions = actions
            .map((item) => typeof item?.body?.description === 'string' ? item.body.description.trim() : '')
            .filter(Boolean);
          const issueAction = action.owner_issue_action && typeof action.owner_issue_action === 'object'
            ? action.owner_issue_action
            : {};
          const cohorts = Array.isArray(report.candidate_cohorts) ? report.candidate_cohorts : [];
          const firstCohort = cohorts.find((cohort) => cohort && typeof cohort === 'object') || {};
          const appendBody = (lines, title, body) => {
            if (!body) {
              return;
            }
            lines.push('', `#### ${title}`, '', '```markdown', body, '```');
          };

          const bodyDescription = bodyDescriptions.join('\n\n---\n\n');
          const copyableCommand = copyableCommands.join('\n\n');

          const lines = [
            '',
            '## Docs Freshness Maintenance Decision',
            '',
            `- Decision: ${report.freshness_decision || 'unknown'}`,
            `- Owner issue: ${report.owner_issue || 'none'}`,
            `- Policy capacity: ${report.policy_capacity_status?.status || 'unknown'}`,
            `- Repo gate severity: ${gate.severity || 'unknown'}`,
            `- Repo gate actions: ${gate.action_required_count ?? 0}`,
            `- Blocks unrelated lanes: ${gate.blocks_unrelated_lanes === true ? 'yes' : 'no'}`,
            `- Blocks handoff: ${gate.blocks_handoff === true ? 'yes' : 'no'}`,
            `- Recommended action: ${report.recommended_action || 'none'}`,
            '',
            '### Canonical Owner Action Evidence',
            '',
            `- Evidence status: ${evidence.status || 'not_emitted'}`,
            `- Write status: ${evidence.write_status || 'unknown'}`,
            `- Required actions: ${evidence.required_actions ?? 0}`,
            `- Mode: ${action.mode || 'none'}`,
            `- Reason: ${issueAction.reason || 'none'}`,
            `- Issue: ${action.owner_issue || issueAction.issue || report.owner_issue || 'none'}`,
            `- Canonical owner key: ${action.canonical_owner_key || firstCohort.canonical_owner_key || 'none'}`,
            `- Canonical owner marker: ${action.canonical_owner_marker || firstCohort.canonical_owner_marker || 'none'}`,
            `- Candidate cohorts: ${cohorts.length}`,
            `- Copyable command: ${copyableCommand ? 'emitted' : 'none'}`,
            `- Copyable body: ${bodyDescription ? 'emitted' : 'none'}`
          ];
          appendBody(lines, 'Copyable Command', copyableCommand);
          appendBody(lines, 'Copyable Owner Body', bodyDescription);
          fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, `${lines.join('\n')}\n`);
          NODE
          printf '\n' >> "$GITHUB_STEP_SUMMARY"
          cat "$REPORT_DIR/repo-stewardship-summary.md" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload repo stewardship artifacts
        uses: actions/upload-artifact@v7
        with:
          name: docs-truthfulness-maintenance
          path: |
            ${{ env.REPORT_DIR }}/docs-freshness.json
            ${{ env.REPORT_DIR }}/docs-freshness-maintenance.json
            ${{ env.REPORT_DIR }}/docs-freshness-summary.md
            ${{ env.REPORT_DIR }}/implementation-docs-archive/docs-archive-report.json
            ${{ env.REPORT_DIR }}/repo-stewardship.json
            ${{ env.REPORT_DIR }}/repo-stewardship-summary.md
