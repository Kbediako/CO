name: Core Lane (Build / Lint / Test / Spec Guard)

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      archive_pr_number:
        description: Archive automation PR number, when dispatched by archive automation.
        required: true
        type: string
      archive_pr_branch:
        description: Archive automation PR branch, when dispatched by archive automation.
        required: true
        type: string
      archive_pr_head_sha:
        description: Archive automation PR head SHA, when dispatched by archive automation.
        required: true
        type: string

jobs:
  core-lane:
    name: Core Lane
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: read
      pull-requests: read
    steps:
      - name: Checkout (full history for diffs)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Node 20 LTS matches the repo’s TypeScript/@types/node baseline and local developer guidance.
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Set BASE_SHA from PR base
        if: ${{ github.event_name == 'pull_request' }}
        run: echo "BASE_SHA=${{ github.event.pull_request.base.sha }}" >> "$GITHUB_ENV"

      - name: Validate archive PR dispatch inputs
        if: ${{ github.event_name == 'workflow_dispatch' }}
        env:
          ARCHIVE_PR_NUMBER: ${{ inputs.archive_pr_number }}
          ARCHIVE_PR_BRANCH: ${{ inputs.archive_pr_branch }}
          ARCHIVE_PR_HEAD_SHA: ${{ inputs.archive_pr_head_sha }}
        run: |
          set -euo pipefail

          if [[ -z "${ARCHIVE_PR_NUMBER}" || -z "${ARCHIVE_PR_BRANCH}" || -z "${ARCHIVE_PR_HEAD_SHA}" ]]; then
            echo "::error::workflow_dispatch requires archive_pr_number, archive_pr_branch, and archive_pr_head_sha."
            exit 1
          fi

          if [[ ! "${ARCHIVE_PR_NUMBER}" =~ ^[0-9]+$ ]]; then
            echo "::error::archive_pr_number must be a positive integer."
            exit 1
          fi

          if [[ ! "${ARCHIVE_PR_HEAD_SHA}" =~ ^[0-9a-fA-F]{40}$ ]]; then
            echo "::error::archive_pr_head_sha must be a 40-character commit SHA."
            exit 1
          fi

          case "${ARCHIVE_PR_BRANCH}" in
            automation/tasks-archive|automation/implementation-docs-archive)
              ;;
            *)
              echo "::error::archive_pr_branch must be a known archive automation branch."
              exit 1
              ;;
          esac

          if [[ "${ARCHIVE_PR_BRANCH}" != "${GITHUB_REF_NAME}" ]]; then
            echo "::error::archive_pr_branch (${ARCHIVE_PR_BRANCH}) does not match dispatched ref (${GITHUB_REF_NAME})."
            exit 1
          fi

          if [[ "${ARCHIVE_PR_HEAD_SHA,,}" != "${GITHUB_SHA,,}" ]]; then
            echo "::error::archive_pr_head_sha (${ARCHIVE_PR_HEAD_SHA}) does not match the dispatched ref (${GITHUB_SHA})."
            exit 1
          fi

      - name: Set BASE_SHA from archive PR dispatch
        if: ${{ github.event_name == 'workflow_dispatch' }}
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ inputs.archive_pr_number }}
          PR_BRANCH: ${{ inputs.archive_pr_branch }}
          PR_HEAD_SHA: ${{ inputs.archive_pr_head_sha }}
        run: |
          set -euo pipefail

          PR_FIELDS="$(gh api "repos/${{ github.repository }}/pulls/${PR_NUMBER}" --jq '[.state, .base.ref, .base.sha, .head.sha, .head.repo.full_name, .head.ref] | @tsv')"
          IFS=$'\t' read -r LIVE_PR_STATE LIVE_PR_BASE_REF BASE_SHA LIVE_PR_HEAD_SHA LIVE_PR_HEAD_REPO LIVE_PR_HEAD_REF <<< "${PR_FIELDS}"

          if [[ -z "${LIVE_PR_STATE}" || -z "${LIVE_PR_BASE_REF}" || -z "${BASE_SHA}" || -z "${LIVE_PR_HEAD_SHA}" || -z "${LIVE_PR_HEAD_REPO}" || -z "${LIVE_PR_HEAD_REF}" ]]; then
            echo "::error::Could not resolve complete PR metadata for archive PR #${PR_NUMBER}."
            exit 1
          fi

          if [[ "${LIVE_PR_STATE}" != "open" ]]; then
            echo "::error::Archive PR #${PR_NUMBER} must be open; current state is ${LIVE_PR_STATE}."
            exit 1
          fi

          if [[ "${LIVE_PR_BASE_REF}" != "main" ]]; then
            echo "::error::Archive PR #${PR_NUMBER} base ref (${LIVE_PR_BASE_REF}) must be main."
            exit 1
          fi

          if [[ "${LIVE_PR_HEAD_SHA,,}" != "${PR_HEAD_SHA,,}" ]]; then
            echo "::error::Archive PR #${PR_NUMBER} head SHA (${LIVE_PR_HEAD_SHA}) does not match archive_pr_head_sha (${PR_HEAD_SHA})."
            exit 1
          fi

          if [[ "${LIVE_PR_HEAD_REPO}" != "${GITHUB_REPOSITORY}" ]]; then
            echo "::error::Archive PR #${PR_NUMBER} head repo (${LIVE_PR_HEAD_REPO}) does not match ${GITHUB_REPOSITORY}."
            exit 1
          fi

          if [[ "${LIVE_PR_HEAD_REF}" != "${PR_BRANCH}" ]]; then
            echo "::error::Archive PR #${PR_NUMBER} head ref (${LIVE_PR_HEAD_REF}) does not match archive_pr_branch (${PR_BRANCH})."
            exit 1
          fi

          if [[ "${LIVE_PR_HEAD_REF}" != "${GITHUB_REF_NAME}" ]]; then
            echo "::error::Archive PR #${PR_NUMBER} head ref (${LIVE_PR_HEAD_REF}) does not match dispatched ref (${GITHUB_REF_NAME})."
            exit 1
          fi

          echo "BASE_SHA=${BASE_SHA}" >> "$GITHUB_ENV"

      - name: Detect downstream simulation scope
        id: downstream-smoke
        shell: bash
        run: |
          set -euo pipefail
          RANGE=""
          if [[ -n "${BASE_SHA:-}" ]]; then
            RANGE="${BASE_SHA}...HEAD"
          elif [[ "${{ github.event.before }}" != "" ]] && [[ "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]]; then
            RANGE="${{ github.event.before }}...HEAD"
          fi

          if [[ -n "${RANGE}" ]]; then
            CHANGED="$(git diff --name-only "${RANGE}")"
          else
            CHANGED="$(git show --name-only --pretty='' HEAD)"
          fi

          echo "Changed files:"
          printf '%s\n' "${CHANGED}"

          if printf '%s\n' "${CHANGED}" | grep -Eq '^(\.agents/plugins/|plugins/|bin/|dist/scripts/run-review\.js|scripts/(pack-smoke\.mjs|pack-audit\.mjs|run-review\.ts|lib/)|skills/|orchestrator/src/cli/|package\.json|tsconfig\.build\.json|README\.md|docs/README\.md|docs/AGENTS\.md|docs/standalone-review-guide\.md|docs/skills-release\.md|docs/guides/review-artifacts\.md|docs/public/(downstream-setup|provider-onboarding)\.md)'; then
            echo "required=true" >> "$GITHUB_OUTPUT"
            echo "Downstream simulation smoke: required"
          else
            echo "required=false" >> "$GITHUB_OUTPUT"
            echo "Downstream simulation smoke: skipped"
          fi

      - name: Resolve diff-budget override (label + reason)
        if: ${{ github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch' }}
        env:
          ARCHIVE_PR_NUMBER: ${{ github.event_name == 'workflow_dispatch' && inputs.archive_pr_number || '' }}
          DIFF_BUDGET_OVERRIDE_LABEL: diff-budget-override
          GITHUB_API_URL: ${{ github.api_url }}
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          node - <<'NODE'
          const fs = require('fs');

          async function main() {
            async function fetchJsonWithTimeout(url, options = {}, timeoutMs = 10_000) {
              const controller = new AbortController();
              const timeoutId = setTimeout(() => controller.abort(), timeoutMs);
              try {
                const response = await fetch(url, {
                  ...options,
                  signal: controller.signal
                });
                if (!response.ok) {
                  throw new Error(`${response.status} ${response.statusText}`);
                }
                return await response.json();
              } finally {
                clearTimeout(timeoutId);
              }
            }

            const labelName = process.env.DIFF_BUDGET_OVERRIDE_LABEL;
            const eventPath = process.env.GITHUB_EVENT_PATH;
            if (!labelName || !eventPath) {
              process.exit(0);
            }

            const event = JSON.parse(fs.readFileSync(eventPath, 'utf8'));
            let pullRequest = event.pull_request;
            const archivePullNumber = Number(process.env.ARCHIVE_PR_NUMBER ?? 0);
            let pullNumber = Number(pullRequest?.number ?? archivePullNumber ?? 0);
            if (!pullRequest && pullNumber <= 0) {
              process.exit(0);
            }

            const repository = process.env.GITHUB_REPOSITORY;
            const apiBase = process.env.GITHUB_API_URL || 'https://api.github.com';
            const token = process.env.GITHUB_TOKEN;
            if (pullNumber > 0 && repository && token) {
              try {
                pullRequest = await fetchJsonWithTimeout(
                  `${apiBase}/repos/${repository}/issues/${pullNumber}`,
                  {
                    headers: {
                      Authorization: `Bearer ${token}`,
                      Accept: 'application/vnd.github+json',
                      'User-Agent': 'co-core-lane-diff-budget-override'
                    }
                  }
                );
              } catch (error) {
                const message = error instanceof Error ? error.message : String(error);
                console.warn(
                  `Warning: failed to refresh live PR metadata for #${pullNumber}; falling back to event payload (${message}).`
                );
              }
            }

            if (!pullRequest) {
              process.exit(0);
            }

            const labels = Array.isArray(pullRequest.labels)
              ? pullRequest.labels.map((label) => String(label?.name ?? '')).filter(Boolean)
              : [];
            if (!labels.includes(labelName)) {
              process.exit(0);
            }

            const body = String(pullRequest.body ?? '');
            const prefix = 'Diff budget override:';
            let reason = '';
            for (const rawLine of body.split(/\r?\n/)) {
              const line = rawLine.trim();
              if (line.startsWith(prefix)) {
                reason = line.slice(prefix.length).trim();
                break;
              }
            }

            if (!reason) {
              console.error(`Diff budget override label "${labelName}" is present, but no non-empty reason was found.`);
              console.error('Add this single line to the PR description:');
              console.error('  Diff budget override: <reason>');
              process.exit(1);
            }

            const envFile = process.env.GITHUB_ENV;
            if (envFile) {
              fs.appendFileSync(envFile, `DIFF_BUDGET_OVERRIDE_REASON<<EOF\n${reason}\nEOF\n`);
            }

            const summaryFile = process.env.GITHUB_STEP_SUMMARY;
            if (summaryFile) {
              fs.appendFileSync(
                summaryFile,
                `### Diff budget override\n\nLabel: \`${labelName}\`\n\nReason: ${reason}\n`
              );
            }

            console.log(`Diff budget override enabled: ${reason}`);
          }

          main().catch((error) => {
            console.error(error);
            process.exit(1);
          });
          NODE

      - name: Diff budget
        if: ${{ github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch' }}
        run: node scripts/diff-budget.mjs

      - name: Instruction stamp check
        run: node scripts/update-instruction-stamp.mjs --check

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Lint
        run: npm run lint

      - name: Test (core matrix)
        run: npm run test:core

      - name: Install Codex CLI for marketplace smoke
        if: ${{ steps.downstream-smoke.outputs.required == 'true' }}
        run: npm install --global @openai/codex@0.125.0

      - name: Downstream simulation smoke
        if: ${{ steps.downstream-smoke.outputs.required == 'true' }}
        run: npm run pack:smoke

      - name: Docs hygiene
        run: npm run docs:check

      - name: Spec guard
        run: node scripts/spec-guard.mjs
